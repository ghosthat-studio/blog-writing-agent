<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent dashboard</title>
<style>
  :root {
    --bg: #101216; --panel: #171a20; --line: #2a2f3a;
    --text: #d6dae3; --dim: #9aa2b1; --accent: #7fb4d8; --ok: #8fc78f; --warn: #d8a97f;
  }
  * { margin: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font: 16px/1.5 ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
  header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--line); display: flex; align-items: baseline; gap: 1rem; }
  header h1 { font-size: 1.15rem; font-weight: 600; }
  header .status { color: var(--dim); font-size: 0.875rem; }
  header .status.busy { color: var(--warn); }
  main { display: grid; grid-template-columns: minmax(280px, 380px) 1fr; gap: 1px; background: var(--line); min-height: calc(100vh - 3.5rem); }
  main > section { background: var(--bg); padding: 1.25rem 1.5rem; }
  h2 { font-size: 0.875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--dim); margin-bottom: 0.75rem; }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 6px; padding: 1rem; margin-bottom: 1.25rem; }
  textarea, input[type=text] { width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--line); border-radius: 4px; padding: 0.5rem; font: inherit; font-size: 0.9375rem; }
  textarea { min-height: 4.5rem; resize: vertical; }
  label.check { display: flex; gap: 0.5rem; align-items: center; margin: 0.6rem 0; font-size: 0.9375rem; color: var(--dim); }
  button { background: var(--accent); color: #0d1117; border: 0; border-radius: 4px; padding: 0.5rem 0.9rem; font: inherit; font-size: 0.9375rem; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: 0.45; cursor: default; }
  button.quiet { background: transparent; color: var(--accent); border: 1px solid var(--line); font-weight: 400; }
  button.approve { background: var(--ok); }
  .draft { display: flex; align-items: center; gap: 0.6rem; padding: 0.5rem 0.25rem; border-bottom: 1px solid var(--line); font-size: 0.9375rem; }
  .draft:last-child { border-bottom: 0; }
  .draft .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; color: var(--accent); }
  .draft .tag { font-size: 0.875rem; color: var(--ok); }
  .log { font-size: 0.875rem; color: var(--dim); max-height: 16rem; overflow-y: auto; }
  .log div { padding: 0.2rem 0; border-bottom: 1px solid var(--line); }
  #viewer { width: 100%; min-height: 60vh; border: 1px solid var(--line); border-radius: 6px; background: #fff; }
  #viewer-empty { color: var(--dim); padding: 2rem 0; }
  .err { color: #e08f8f; font-size: 0.9375rem; margin-top: 0.5rem; white-space: pre-wrap; }
  .jobline { font-size: 0.875rem; color: var(--warn); margin-top: 0.5rem; }
</style>
</head>
<body>
<header>
  <h1 id="agent-name">…</h1>
  <span class="status" id="status">idle</span>
</header>
<main>
  <section>
    <div class="panel">
      <h2>New draft</h2>
      <textarea id="idea" placeholder="What should she write about?"></textarea>
      <label class="check"><input type="checkbox" id="review" checked> fact-check the draft (facts only, never voice)</label>
      <button id="go">Draft it</button>
      <div class="jobline" id="jobline" hidden></div>
      <div class="err" id="err" hidden></div>
    </div>
    <div class="panel">
      <h2>Drafts</h2>
      <div id="drafts"></div>
    </div>
    <div class="panel">
      <h2>Activity</h2>
      <div class="log" id="runlog"></div>
    </div>
  </section>
  <section>
    <h2>Reading</h2>
    <div id="viewer-empty">Click a draft to read it. Approve publishes it — nothing goes out without you.</div>
    <iframe id="viewer" hidden sandbox=""></iframe>
  </section>
</main>
<script>
const $ = id => document.getElementById(id);
let busy = false;

async function api(path, body) {
  const opts = body ? {method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(body)} : {};
  const r = await fetch(path, opts);
  const d = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(d.error || r.statusText);
  return d;
}

function draftRow(d) {
  const row = document.createElement("div");
  row.className = "draft";
  const name = document.createElement("span");
  name.className = "name"; name.textContent = d.file;
  name.onclick = () => view(d.file);
  row.appendChild(name);
  if (d.approved) {
    const tag = document.createElement("span");
    tag.className = "tag"; tag.textContent = "approved";
    row.appendChild(tag);
  } else {
    const btn = document.createElement("button");
    btn.className = "approve"; btn.textContent = "Approve";
    btn.onclick = async () => { await api("/api/approve", {file: d.file}); refresh(); };
    row.appendChild(btn);
  }
  return row;
}

async function view(file) {
  const r = await fetch("/api/draft?file=" + encodeURIComponent(file));
  const text = await r.text();
  $("viewer-empty").hidden = true;
  const v = $("viewer");
  v.hidden = false;
  v.srcdoc = "<style>body{font:17px/1.6 Georgia,serif;max-width:42em;margin:2em auto;padding:0 1em;color:#222}</style>" + text;
}

async function refresh() {
  const d = await api("/api/state");
  $("agent-name").textContent = d.name;
  document.title = d.name + " — dashboard";
  const drafts = $("drafts");
  drafts.replaceChildren(...d.drafts.map(draftRow));
  if (!d.drafts.length) drafts.textContent = "none yet";
  const running = d.jobs.filter(j => j.status === "running");
  busy = running.length > 0;
  $("status").textContent = busy ? "working…" : "idle";
  $("status").className = "status" + (busy ? " busy" : "");
  $("jobline").hidden = !busy;
  if (busy) $("jobline").textContent = running.map(j => j.kind + " running…").join(", ");
  const failed = d.jobs.find(j => j.status === "error");
  $("err").hidden = !failed;
  if (failed) $("err").textContent = failed.error;
  const log = await api("/api/runlog");
  $("runlog").replaceChildren(...log.records.slice().reverse().map(r => {
    const line = document.createElement("div");
    line.textContent = (r.ts || "").replace("T", " ") + "  " + r.kind + (r.slug ? "  " + r.slug : "");
    return line;
  }));
}

$("go").onclick = async () => {
  const idea = $("idea").value.trim();
  if (!idea || busy) return;
  $("err").hidden = true;
  await api("/api/run", {mode: "draft", idea, review: $("review").checked});
  $("idea").value = "";
  poll();
};

let timer = null;
function poll() {
  clearTimeout(timer);
  refresh().finally(() => { timer = setTimeout(poll, busy ? 2000 : 10000); });
}
poll();
</script>
</body>
</html>
